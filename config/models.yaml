# Model assignments for each agent role
# Phase A: Claude-only configuration
# To switch models, change the model_id field (no code changes needed)
# Supports: anthropic/*, openai/*, ollama/*, or any litellm-compatible model ID

providers:
  anthropic:
    api_key_env: ANTHROPIC_API_KEY
    # base_url from ANTHROPIC_BASE_URL env var (auto-detected)

models:
  literature_review:
    primary:
      provider: anthropic
      model_id: anthropic/claude-sonnet-4-20250514
      temperature: 0.5
      max_tokens: 8192

