# Model assignments for each agent role
# Phase B: Multi-model configuration (Claude + GPT-4o)
# Supports: anthropic/*, openai/*, ollama/*, or any litellm-compatible model ID

providers:
  anthropic:
    api_key_env: ANTHROPIC_API_KEY
    # base_url from ANTHROPIC_BASE_URL env var (auto-detected)
  openai:
    api_key_env: OPENAI_API_KEY

models:
  literature_review:
    primary:
      provider: anthropic
      model_id: anthropic/claude-sonnet-4-20250514
      temperature: 0.5
      max_tokens: 8192

  ideation:
    primary:
      provider: anthropic
      model_id: anthropic/claude-sonnet-4-20250514
      temperature: 0.7
      max_tokens: 16384

  formulation:
    primary:
      provider: openai
      model_id: openai/gpt-4o
      temperature: 0.4
      max_tokens: 16384

  experiments:
    primary:
      provider: openai
      model_id: openai/gpt-4o
      temperature: 0.3
      max_tokens: 16384

  analysis:
    primary:
      provider: anthropic
      model_id: anthropic/claude-sonnet-4-20250514
      temperature: 0.5
      max_tokens: 8192

  manuscript:
    primary:
      provider: anthropic
      model_id: anthropic/claude-opus-4-20250514
      temperature: 0.6
      max_tokens: 16384

  reviewer:
    primary:
      provider: anthropic
      model_id: anthropic/claude-opus-4-20250514
      temperature: 0.3
      max_tokens: 8192

  editor:
    primary:
      provider: anthropic
      model_id: anthropic/claude-sonnet-4-20250514
      temperature: 0.3
      max_tokens: 8192
